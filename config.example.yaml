# Chat Service Configuration
#
# Environment variables are expanded: $VAR or ${VAR}

llm:
  provider: anthropic                # "openai", "anthropic", "bedrock", "custom", "llm-proxy"
  endpoint: https://api.anthropic.com
  api_key: $ANTHROPIC_API_KEY
  model: claude-sonnet-4-20250514

mcp_servers:
  - name: harvest-mcp
    url: http://localhost:8082
    capability: harvest
  - name: ontap-mcp
    url: http://localhost:8083
    capability: ontap

# Dynamic MCP server discovery (alternative to mcp_servers).
# When mode is "docker", servers are discovered from Docker container labels
# instead of the mcp_servers list above. Containers must have:
#   mcp.discover=true, mcp.name=<name>, mcp.endpoint=<url>
# Optional: mcp.capability=<id>
#
# mcp_discovery:
#   mode: docker             # "static" (default) or "docker"
#   poll_interval: 30s       # how often to check for new/removed servers
#   socket_path: /var/run/docker.sock
#   label_prefix: "mcp."

capabilities:
  defaults:
    harvest: allow
    ontap: ask

interests:
  dirs:
    - ./interests

product:
  name: NABox
  description: NetApp storage monitoring appliance
  guidelines:
    - Always verify cluster connectivity before running destructive operations
    - Prefer read-only operations unless the user explicitly requests changes

server:
  addr: ":8090"

# Built-in chat UI shell. Enable this for products that don't have their own frontend.
# When enabled, the chat service serves a full-page chat interface at /.
ui:
  enabled: false
